<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>비행경로 추천 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header id="topbar">
    <h1 id="app-title">비행경로 추천 지도</h1>
    <div id="counts" class="muted"></div>
    <div id="viewmode-toggle" class="segmented" role="tablist" aria-label="뷰 모드">
      <button data-mode="focus" class="active" role="tab" aria-selected="true">결정 포커스</button>
      <button data-mode="region" role="tab" aria-selected="false">지역 컨텍스트</button>
      <button data-mode="world" role="tab" aria-selected="false">전세계</button>
    </div>
    <div id="adsb-chip" class="chip" title="실시간 항공기">ADS-B --</div>
  </header>

  <main id="layout">
    <section id="panel-left" class="panel">
      <h2>ROUTE</h2>
      <div class="field">
        <label for="dep-select">출발</label>
        <select id="dep-select"><option value="">불러오는 중…</option></select>
      </div>
      <div class="field">
        <label for="arr-select">도착</label>
        <select id="arr-select" disabled><option value="">출발 선택 필요</option></select>
      </div>
      <div id="route-briefing" class="briefing"></div>
      <ol id="route-options" class="route-options"></ol>
      <p id="route-error" class="error" hidden></p>
    </section>

    <section id="map-wrap">
      <div id="map"></div>
      <div id="minimap"></div>
    </section>

    <section id="panel-right" class="panel">
      <h2>의사결정 근거</h2>
      <div id="fir-chain" class="fir-chain muted">경로를 선택하면 경유 FIR 체인이 표시됩니다.</div>
      <div id="route-fois-summary" class="route-fois-summary muted"></div>

      <h2>FOIS 지연원인</h2>
      <form id="fois-form">
        <div class="field">
          <label for="fois-direction">구분</label>
          <select id="fois-direction">
            <option value="dep">출발</option>
            <option value="arr">도착</option>
          </select>
        </div>
        <div class="field">
          <label for="fois-airport">공항 ICAO (선택)</label>
          <input id="fois-airport" type="text" maxlength="4" placeholder="예: RKSI" />
        </div>
        <div class="field fois-date-range">
          <label for="fois-date-from">기간 (선택)</label>
          <input id="fois-date-from" type="date" />
          <span aria-hidden="true">~</span>
          <input id="fois-date-to" type="date" />
        </div>
        <button id="fois-search-btn" type="submit">조회</button>
      </form>
      <p id="fois-summary" class="muted"></p>
      <ol id="fois-causes" class="fois-causes"></ol>
      <p id="fois-error" class="error" hidden></p>

      <h2>흐름관리 조치</h2>
      <form id="flow-form">
        <div class="field fois-date-range">
          <label for="flow-date-from">기간 (선택)</label>
          <input id="flow-date-from" type="date" />
          <span aria-hidden="true">~</span>
          <input id="flow-date-to" type="date" />
        </div>
        <div class="field">
          <label for="flow-fir">대상 FIR (선택)</label>
          <input id="flow-fir" type="text" maxlength="10" placeholder="예: RKRR" />
        </div>
        <div class="field">
          <label for="flow-airway">대상 항공로 (선택)</label>
          <input id="flow-airway" type="text" maxlength="10" placeholder="예: A591" />
        </div>
        <button id="flow-search-btn" type="submit">조회</button>
      </form>
      <p id="flow-summary" class="muted"></p>
      <ol id="flow-items" class="flow-items"></ol>
      <button id="flow-more-btn" type="button" hidden>더 보기</button>
      <p id="flow-error" class="error" hidden></p>
    </section>
  </main>

  <div id="weather-popup-root"></div>
  <div id="toast-root" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
